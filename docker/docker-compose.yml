services:
  sql-deadlock:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-deadlock
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Demo@1234!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S", "localhost",
          "-U", "sa",
          "-P", "Demo@1234!",
          "-Q", "SELECT 1",
          "-No"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  sql_data: